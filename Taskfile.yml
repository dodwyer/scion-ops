version: '3'

# Keep the repo-local toolchain visible to every task without relying on an
# interactive shell profile.
env:
  PATH: '{{.HOME}}/.local/bin:{{.HOME}}/.npm-global/bin:{{.GOPATH}}/bin:{{.PATH}}'

vars:
  SCION_OPS_KIND_LISTEN_ADDRESS:
    sh: printf '%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}"
  SCION_OPS_KIND_HUB_PORT:
    sh: printf '%s' "${SCION_OPS_KIND_HUB_PORT:-18090}"
  SCION_OPS_KIND_HUB_URL:
    sh: printf 'http://%s:%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}" "${SCION_OPS_KIND_HUB_PORT:-18090}"
  KIND_CLUSTER_NAME:
    sh: printf '%s' "${KIND_CLUSTER_NAME:-scion-ops}"
  KIND_CONTEXT:
    sh: printf 'kind-%s' "${KIND_CLUSTER_NAME:-scion-ops}"
  SCION_K8S_NAMESPACE:
    sh: printf '%s' "${SCION_K8S_NAMESPACE:-scion-agents}"
  SCION_OPS_MCP_HOST:
    sh: printf '%s' "${SCION_OPS_MCP_HOST:-${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}}"
  SCION_OPS_MCP_PORT:
    sh: printf '%s' "${SCION_OPS_MCP_PORT:-8765}"
  SCION_OPS_MCP_PATH:
    sh: printf '%s' "${SCION_OPS_MCP_PATH:-/mcp}"
  SCION_OPS_MCP_URL:
    sh: |
      path="${SCION_OPS_MCP_PATH:-/mcp}"
      case "$path" in
        /*) ;;
        *) path="/$path" ;;
      esac
      printf 'http://%s:%s%s' "${SCION_OPS_MCP_HOST:-${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}}" "${SCION_OPS_MCP_PORT:-8765}" "$path"
  SCION_OPS_WEB_APP_PORT:
    sh: printf '%s' "${SCION_OPS_WEB_APP_PORT:-8808}"
  SCION_OPS_WEB_APP_URL:
    sh: printf 'http://%s:%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}" "${SCION_OPS_WEB_APP_PORT:-8808}"
  SCION_OPS_NEW_UI_EVAL_PORT:
    sh: printf '%s' "${SCION_OPS_NEW_UI_EVAL_PORT:-8880}"
  SCION_OPS_NEW_UI_EVAL_URL:
    sh: printf 'http://%s:%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}" "${SCION_OPS_NEW_UI_EVAL_PORT:-8880}"
  SCION_OPS_NEW_UI_EVAL_IMAGE:
    sh: printf '%s' "${SCION_OPS_NEW_UI_EVAL_IMAGE:-localhost/scion-ops-new-ui-eval:latest}"
  HOME:
    sh: echo "$HOME"
  GOPATH:
    sh: command -v go >/dev/null 2>&1 && go env GOPATH || printf '%s/go' "$HOME"
  SCION_BIN: scion

tasks:
  x:
    desc: Build, deploy/update, bootstrap, and smoke test the Kubernetes deployment.
    cmds:
      - task: build
      - task: up
      - task: bootstrap
      - task: test

  build:
    desc: Build all Scion images required by the Kubernetes deployment.
    cmds:
      - bash scripts/build-images.sh {{.CLI_ARGS}}

  build:base:
    cmds:
      - bash scripts/build-images.sh --only base {{.CLI_ARGS}}

  build:mcp:
    cmds:
      - bash scripts/build-images.sh --only mcp {{.CLI_ARGS}}

  build:new-ui-eval:
    desc: Build the new UI evaluation preview image.
    cmds:
      - docker build --tag '{{.SCION_OPS_NEW_UI_EVAL_IMAGE}}' --file image-build/new-ui-eval/Dockerfile .

  build:harness:
    cmds:
      - bash scripts/build-images.sh --only {{.CLI_ARGS}}

  up:
    desc: Create or update the kind Kubernetes deployment.
    cmds:
      - task: kind:up
      - task: kind:workspace:status
      - task kind:load-images -- localhost/scion-base:latest localhost/scion-ops-mcp:latest localhost/scion-claude:latest localhost/scion-codex:latest localhost/scion-gemini:latest '{{.SCION_OPS_NEW_UI_EVAL_IMAGE}}'
      - task: kind:control-plane:apply
      - task: kind:control-plane:restart
      - task: kind:control-plane:status
      - task: kind:web-app:status
      - task: kind:new-ui-eval:status

  test:
    desc: Smoke test the Kubernetes-hosted Hub, broker, MCP, and agent runtime.
    cmds:
      - task kind:control-plane:smoke -- {{.CLI_ARGS}}

  bootstrap:
    desc: Restore Hub secrets, harness configs, and templates for rounds.
    cmds:
      - task kind:bootstrap -- {{.CLI_ARGS}}

  spec:validate:
    desc: Validate an OpenSpec change artifact set in a target project.
    cmds:
      - python3 scripts/validate-openspec-change.py {{.CLI_ARGS}}

  spec:archive:
    desc: Archive an accepted OpenSpec change and sync accepted specs.
    cmds:
      - python3 scripts/archive-openspec-change.py {{.CLI_ARGS}}

  spec:steward:
    desc: Start a Scion-native OpenSpec steward session for a target project.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/spec-steward.sh "$@"

  spec:steward:dry-run:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        SCION_OPS_DRY_RUN=1 bash orchestrator/spec-steward.sh "$@"

  spec:implement:
    desc: Start an implementation steward session from an approved OpenSpec change.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/implementation-steward.sh "$@"

  spec:implement:dry-run:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        SCION_OPS_DRY_RUN=1 bash orchestrator/implementation-steward.sh "$@"

  steward:validate:
    desc: Validate durable state for a Scion OpenSpec steward session.
    cmds:
      - python3 scripts/validate-steward-session.py {{.CLI_ARGS}}

  steward:pr:
    desc: Create or return the GitHub PR for a ready Scion OpenSpec steward session.
    cmds:
      - python3 scripts/finalize-steward-pr.py {{.CLI_ARGS}}

  down:
    desc: Destroy the kind Kubernetes deployment.
    prompt: This deletes the {{.KIND_CLUSTER_NAME}} kind cluster and all cluster-local Scion state. Continue?
    cmds:
      - task: kind:down

  deploy:
    cmds:
      - task: up

  update:
    cmds:
      - task: up

  update:hub:
    cmds:
      - task kind:load-images -- localhost/scion-base:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-hub
      - task: kind:hub:status

  update:broker:
    cmds:
      - task kind:load-images -- localhost/scion-base:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-broker
      - task: kind:broker:status

  update:mcp:
    cmds:
      - task kind:load-images -- localhost/scion-ops-mcp:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-mcp
      - task: kind:mcp:status

  update:web-app:
    desc: Reload the web app image and restart its deployment.
    cmds:
      - task kind:load-images -- localhost/scion-ops-mcp:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-web-app
      - task: kind:web-app:status

  update:new-ui-eval:
    desc: Reload the new UI evaluation image and restart its preview deployment.
    cmds:
      - task kind:load-images -- '{{.SCION_OPS_NEW_UI_EVAL_IMAGE}}'
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-new-ui-eval
      - task: kind:new-ui-eval:status

  load:image:
    cmds:
      - task kind:load-images -- {{.CLI_ARGS}}

  scion:patch:status:
    desc: Show whether the configured Scion source has required runtime patches.
    cmds:
      - bash scripts/scion-runtime-patches.sh status {{.CLI_ARGS}}

  scion:patch:check:
    desc: Verify that required Scion runtime patches are already applied.
    cmds:
      - bash scripts/scion-runtime-patches.sh check {{.CLI_ARGS}}

  scion:patch:apply:
    desc: Apply required Scion runtime patches to the configured Scion source.
    cmds:
      - bash scripts/scion-runtime-patches.sh apply {{.CLI_ARGS}}

  dev:mcp:restart:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-mcp
      - task: kind:mcp:status

  dev:test:
    cmds:
      - task test -- --skip-setup

  storage:status:
    cmds:
      - bash scripts/storage-status.sh

  storage:prune:
    prompt: This prunes dangling local Docker image layers. Continue?
    cmds:
      - docker image prune -f
      - task: storage:status

  web:hub:
    desc: Run the read-only browser hub for scion-ops runtime state.
    cmds:
      - uv run scripts/web_app_hub.py {{.CLI_ARGS}}

  destroy:
    cmds:
      - task: down

  images:build:
    cmds:
      - task build -- {{.CLI_ARGS}}

  kind:up:
    cmds:
      - bash scripts/kind-scion-runtime.sh up

  kind:down:
    cmds:
      - bash scripts/kind-scion-runtime.sh down

  kind:status:
    cmds:
      - bash scripts/kind-scion-runtime.sh status

  kind:workspace:status:
    cmds:
      - bash scripts/kind-scion-runtime.sh workspace-status

  kind:load-images:
    cmds:
      - bash scripts/kind-scion-runtime.sh load-images {{.CLI_ARGS}}

  kind:load-archive:
    cmds:
      - bash scripts/kind-scion-runtime.sh load-archive {{.CLI_ARGS}}

  kind:configure-scion:
    cmds:
      - bash scripts/kind-scion-runtime.sh configure-scion

  kind:control-plane:apply:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' apply -f deploy/kind/namespace.yaml
      - kubectl --context '{{.KIND_CONTEXT}}' apply -k deploy/kind/control-plane
      - bash scripts/kind-scion-runtime.sh configure-mcp-root

  kind:control-plane:restart:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-hub
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-broker
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-broker --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-mcp
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-mcp --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-web-app
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-web-app --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-new-ui-eval
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-new-ui-eval --timeout=120s

  kind:control-plane:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-broker --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-mcp --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-web-app --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-new-ui-eval --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc,pvc,cm -l app.kubernetes.io/part-of=scion-control-plane

  kind:control-plane:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f -l app.kubernetes.io/part-of=scion-control-plane --all-containers=true --max-log-requests=4

  kind:control-plane:smoke:
    cmds:
      - |
        PYTHONDONTWRITEBYTECODE=1 \
        SCION_BIN='{{.SCION_BIN}}' \
        HUB_ENDPOINT='{{.SCION_OPS_KIND_HUB_URL}}' \
        SCION_OPS_KIND_HUB_PORT='{{.SCION_OPS_KIND_HUB_PORT}}' \
        SCION_OPS_KIND_HUB_URL='{{.SCION_OPS_KIND_HUB_URL}}' \
        SCION_OPS_MCP_URL='{{.SCION_OPS_MCP_URL}}' \
        SCION_OPS_WEB_APP_URL='{{.SCION_OPS_WEB_APP_URL}}' \
        SCION_OPS_NEW_UI_EVAL_URL='{{.SCION_OPS_NEW_UI_EVAL_URL}}' \
        uv run scripts/kind-control-plane-smoke.py {{.CLI_ARGS}}

  kind:control-plane:delete:
    prompt: This deletes Kubernetes control-plane resources from {{.KIND_CONTEXT}}. Continue?
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' delete -k deploy/kind/control-plane --ignore-not-found=true

  kind:hub:apply:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' apply -f deploy/kind/namespace.yaml
      - kubectl --context '{{.KIND_CONTEXT}}' apply -k deploy/kind/control-plane

  kind:hub:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc,pvc,cm -l app.kubernetes.io/part-of=scion-control-plane

  kind:hub:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-hub

  kind:hub:auth-export:
    silent: true
    cmds:
      - |
        token="$(kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get secret scion-hub-dev-auth -o jsonpath='{.data.dev-token}' 2>/dev/null | base64 -d 2>/dev/null || true)"
        if [ -z "$token" ]; then
          token="$(kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-hub -c hub -- cat /home/scion/.scion/dev-token)"
        fi
        printf 'export SCION_HUB_ENDPOINT=%s\n' '{{.SCION_OPS_KIND_HUB_URL}}'
        printf 'export HUB_ENDPOINT=%s\n' '{{.SCION_OPS_KIND_HUB_URL}}'
        printf 'export SCION_DEV_TOKEN=%s\n' "$token"

  kind:broker:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-broker --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-broker -c broker -- scion --global broker status --json

  kind:broker:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-broker -c broker

  kind:mcp:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-mcp --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc -l app.kubernetes.io/name=scion-ops-mcp

  kind:mcp:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-ops-mcp

  kind:mcp:smoke:
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 uv run scripts/smoke-mcp-server.py --transport http --url '{{.SCION_OPS_MCP_URL}}'

  kind:web-app:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-web-app --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc -l app.kubernetes.io/name=scion-ops-web-app

  kind:web-app:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-ops-web-app

  kind:new-ui-eval:load:
    desc: Load the new UI evaluation image into kind.
    cmds:
      - task kind:load-images -- '{{.SCION_OPS_NEW_UI_EVAL_IMAGE}}'

  kind:new-ui-eval:restart:
    desc: Restart the new UI evaluation preview deployment.
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-new-ui-eval
      - task: kind:new-ui-eval:status

  kind:new-ui-eval:status:
    desc: Show rollout and service status for the new UI evaluation preview.
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-new-ui-eval --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc -l app.kubernetes.io/name=scion-ops-new-ui-eval
      - "printf 'New UI evaluation preview URL: %s\\n' '{{.SCION_OPS_NEW_UI_EVAL_URL}}'"

  kind:new-ui-eval:logs:
    desc: Follow logs for the new UI evaluation preview.
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-ops-new-ui-eval

  kind:new-ui-eval:smoke:
    desc: Smoke test the new UI evaluation preview health and live read-only endpoints.
    cmds:
      - |
        PYTHONDONTWRITEBYTECODE=1 SCION_OPS_NEW_UI_EVAL_URL='{{.SCION_OPS_NEW_UI_EVAL_URL}}' python3 - <<'PY'
        import json
        import os
        import sys
        import urllib.request

        base = os.environ["SCION_OPS_NEW_UI_EVAL_URL"].rstrip("/")
        for path in ("/healthz", "/api/overview", "/api/snapshot"):
            url = base + path
            with urllib.request.urlopen(url, timeout=5) as response:
                body = response.read().decode(errors="replace")
                if response.status < 200 or response.status >= 300:
                    raise SystemExit(f"{url} returned HTTP {response.status}")
                if path != "/healthz":
                    try:
                        payload = json.loads(body)
                    except json.JSONDecodeError as exc:
                        raise SystemExit(f"{url} did not return JSON: {exc}") from exc
                    if payload.get("sourceMode") != "live":
                        raise SystemExit(f"{url} did not identify live sourceMode")
                    if path == "/api/overview" and payload.get("mocked") is not False:
                        raise SystemExit(f"{url} did not expose mocked=false")
                    if path == "/api/snapshot":
                        preview = payload.get("runtime", {}).get("previewService", {})
                        if preview.get("liveReadsAllowed") is not True or preview.get("mutationsAllowed") is not False:
                            raise SystemExit(f"{url} did not preserve live read-only safeguards")
                        diagnostics = payload.get("diagnostics", {})
                        if diagnostics.get("sourceErrors"):
                            raise SystemExit(f"{url} reported source errors: {diagnostics['sourceErrors']}")
                print(f"ok {url}")
        PY

  kind:bootstrap:
    cmds:
      - bash scripts/kind-bootstrap.sh {{.CLI_ARGS}}

  kind:round:preflight:
    cmds:
      - bash scripts/kind-round-preflight.sh {{.CLI_ARGS}}

  kind:doctor:
    cmds:
      - '{{.SCION_BIN}} doctor --profile kind'

  watch:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/watch.sh "$@"

  abort:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/abort.sh "$@"

  look:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        '{{.SCION_BIN}}' look "$@"

  tail:
    cmds:
      - tail -F /tmp/scion-round.log

  verify:
    cmds:
      - git diff --check
      - task --list
      - python3 -c "import ast, pathlib; [ast.parse(pathlib.Path(p).read_text(), filename=p) for p in ('mcp_servers/scion_ops.py', 'scripts/hub-managed-templates.py', 'scripts/steward-state.py', 'scripts/kind-control-plane-smoke.py', 'scripts/smoke-mcp-server.py', 'scripts/validate-openspec-change.py', 'scripts/validate-steward-session.py', 'scripts/finalize-steward-pr.py', 'scripts/archive-openspec-change.py', 'scripts/final_review_repair.py', 'scripts/wait-for-review-artifact.py', 'scripts/precreate-agent-branch.py', 'scripts/web_app_hub.py', 'scripts/test-openspec-change-validator.py', 'scripts/test-steward-session-validator.py', 'scripts/test-steward-pr-finalizer.py', 'scripts/test-openspec-archive.py', 'scripts/test-mcp-openspec-cli.py', 'scripts/test-mcp-progress-lines.py', 'scripts/test-mcp-base-branch.py', 'scripts/test-mcp-implementation-base-branch.py', 'scripts/test-steward-basic-loop.py', 'scripts/test-web-app-hub.py', 'scripts/test-verdict-schema.py', 'scripts/test-final-review-repair.py', 'scripts/test-wait-for-review-artifact.py', 'tests/test_impl_orchestration.py')]"
      - python3 scripts/test-openspec-change-validator.py
      - python3 scripts/test-steward-session-validator.py
      - python3 scripts/test-steward-pr-finalizer.py
      - python3 scripts/test-openspec-archive.py
      - uv run scripts/test-mcp-openspec-cli.py
      - uv run scripts/test-mcp-progress-lines.py
      - uv run scripts/test-mcp-base-branch.py
      - uv run scripts/test-mcp-implementation-base-branch.py
      - python3 scripts/test-steward-basic-loop.py
      - python3 scripts/test-wait-for-review-artifact.py
      - python3 tests/test_impl_orchestration.py
      - uv run scripts/test-web-app-hub.py
      - python3 scripts/test-verdict-schema.py
      - python3 scripts/test-final-review-repair.py
      - bash -n scripts/build-images.sh scripts/kind-bootstrap.sh scripts/kind-round-preflight.sh scripts/scion-runtime-patches.sh scripts/storage-status.sh scripts/impl-publish-handoff.sh deploy/kind/control-plane/config/broker-entrypoint.sh orchestrator/lib/github-branches.sh orchestrator/spec-steward.sh orchestrator/implementation-steward.sh orchestrator/abort.sh
