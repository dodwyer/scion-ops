version: '3'

# Keep the repo-local toolchain visible to every task without relying on an
# interactive shell profile.
env:
  PATH: '{{.HOME}}/.local/bin:{{.HOME}}/.npm-global/bin:{{.GOPATH}}/bin:{{.PATH}}'

vars:
  SCION_OPS_KIND_LISTEN_ADDRESS:
    sh: printf '%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}"
  SCION_OPS_KIND_HUB_PORT:
    sh: printf '%s' "${SCION_OPS_KIND_HUB_PORT:-18090}"
  SCION_OPS_KIND_HUB_URL:
    sh: printf 'http://%s:%s' "${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}" "${SCION_OPS_KIND_HUB_PORT:-18090}"
  KIND_CLUSTER_NAME:
    sh: printf '%s' "${KIND_CLUSTER_NAME:-scion-ops}"
  KIND_CONTEXT:
    sh: printf 'kind-%s' "${KIND_CLUSTER_NAME:-scion-ops}"
  SCION_K8S_NAMESPACE:
    sh: printf '%s' "${SCION_K8S_NAMESPACE:-scion-agents}"
  SCION_OPS_MCP_HOST:
    sh: printf '%s' "${SCION_OPS_MCP_HOST:-${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}}"
  SCION_OPS_MCP_PORT:
    sh: printf '%s' "${SCION_OPS_MCP_PORT:-8765}"
  SCION_OPS_MCP_PATH:
    sh: printf '%s' "${SCION_OPS_MCP_PATH:-/mcp}"
  SCION_OPS_MCP_URL:
    sh: |
      path="${SCION_OPS_MCP_PATH:-/mcp}"
      case "$path" in
        /*) ;;
        *) path="/$path" ;;
      esac
      printf 'http://%s:%s%s' "${SCION_OPS_MCP_HOST:-${SCION_OPS_KIND_LISTEN_ADDRESS:-192.168.122.103}}" "${SCION_OPS_MCP_PORT:-8765}" "$path"
  HOME:
    sh: echo "$HOME"
  GOPATH:
    sh: command -v go >/dev/null 2>&1 && go env GOPATH || printf '%s/go' "$HOME"
  SCION_BIN: scion

tasks:
  x:
    desc: Build, deploy/update, bootstrap, and smoke test the Kubernetes deployment.
    cmds:
      - task: build
      - task: up
      - task: bootstrap
      - task: test

  build:
    desc: Build all Scion images required by the Kubernetes deployment.
    cmds:
      - bash scripts/build-images.sh {{.CLI_ARGS}}

  build:base:
    cmds:
      - bash scripts/build-images.sh --only base {{.CLI_ARGS}}

  build:mcp:
    cmds:
      - bash scripts/build-images.sh --only mcp {{.CLI_ARGS}}

  build:harness:
    cmds:
      - bash scripts/build-images.sh --only {{.CLI_ARGS}}

  up:
    desc: Create or update the kind Kubernetes deployment.
    cmds:
      - task: kind:up
      - task: kind:workspace:status
      - task kind:load-images -- localhost/scion-base:latest localhost/scion-ops-mcp:latest localhost/scion-claude:latest localhost/scion-codex:latest localhost/scion-gemini:latest
      - task: kind:control-plane:apply
      - task: kind:control-plane:restart
      - task: kind:control-plane:status

  test:
    desc: Smoke test the Kubernetes-hosted Hub, broker, MCP, and agent runtime.
    cmds:
      - task kind:control-plane:smoke -- {{.CLI_ARGS}}

  bootstrap:
    desc: Restore Hub secrets, harness configs, and templates for rounds.
    cmds:
      - task kind:bootstrap -- {{.CLI_ARGS}}

  round:
    desc: Start a Scion consensus round after Kubernetes Hub credential bootstrap.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/run-round.sh "$@"

  spec:validate:
    desc: Validate an OpenSpec change artifact set in a target project.
    cmds:
      - python3 scripts/validate-openspec-change.py {{.CLI_ARGS}}

  spec:round:
    desc: Start a spec-building Scion round for a target project.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/spec-round.sh "$@"

  spec:round:dry-run:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        SCION_OPS_DRY_RUN=1 bash orchestrator/spec-round.sh "$@"

  spec:implement:
    desc: Start an implementation round from an approved OpenSpec change.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/spec-implementation-round.sh "$@"

  spec:implement:dry-run:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        SCION_OPS_DRY_RUN=1 bash orchestrator/spec-implementation-round.sh "$@"

  down:
    desc: Destroy the kind Kubernetes deployment.
    prompt: This deletes the {{.KIND_CLUSTER_NAME}} kind cluster and all cluster-local Scion state. Continue?
    cmds:
      - task: kind:down

  deploy:
    cmds:
      - task: up

  update:
    cmds:
      - task: up

  update:hub:
    cmds:
      - task kind:load-images -- localhost/scion-base:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-hub
      - task: kind:hub:status

  update:mcp:
    cmds:
      - task kind:load-images -- localhost/scion-ops-mcp:latest
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-mcp
      - task: kind:mcp:status

  load:image:
    cmds:
      - task kind:load-images -- {{.CLI_ARGS}}

  scion:patch:status:
    desc: Show whether the configured Scion source has required runtime patches.
    cmds:
      - bash scripts/scion-runtime-patches.sh status {{.CLI_ARGS}}

  scion:patch:check:
    desc: Verify that required Scion runtime patches are already applied.
    cmds:
      - bash scripts/scion-runtime-patches.sh check {{.CLI_ARGS}}

  scion:patch:apply:
    desc: Apply required Scion runtime patches to the configured Scion source.
    cmds:
      - bash scripts/scion-runtime-patches.sh apply {{.CLI_ARGS}}

  dev:mcp:restart:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-ops-mcp
      - task: kind:mcp:status

  dev:test:
    cmds:
      - task test -- --skip-setup

  storage:status:
    cmds:
      - bash scripts/storage-status.sh

  storage:prune:
    prompt: This prunes dangling local Podman image layers. Continue?
    cmds:
      - podman image prune -f
      - task: storage:status

  destroy:
    cmds:
      - task: down

  images:build:
    cmds:
      - task build -- {{.CLI_ARGS}}

  kind:up:
    cmds:
      - bash scripts/kind-scion-runtime.sh up

  kind:down:
    cmds:
      - bash scripts/kind-scion-runtime.sh down

  kind:status:
    cmds:
      - bash scripts/kind-scion-runtime.sh status

  kind:workspace:status:
    cmds:
      - bash scripts/kind-scion-runtime.sh workspace-status

  kind:load-images:
    cmds:
      - bash scripts/kind-scion-runtime.sh load-images {{.CLI_ARGS}}

  kind:load-archive:
    cmds:
      - bash scripts/kind-scion-runtime.sh load-archive {{.CLI_ARGS}}

  kind:configure-scion:
    cmds:
      - bash scripts/kind-scion-runtime.sh configure-scion

  kind:control-plane:apply:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' apply -f deploy/kind/namespace.yaml
      - kubectl --context '{{.KIND_CONTEXT}}' apply -k deploy/kind/control-plane

  kind:control-plane:restart:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout restart deploy/scion-hub deploy/scion-ops-mcp

  kind:control-plane:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-mcp --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-hub -c hub -- scion --global broker status --json
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc,pvc,cm -l app.kubernetes.io/part-of=scion-control-plane

  kind:control-plane:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f -l app.kubernetes.io/part-of=scion-control-plane --all-containers=true --max-log-requests=4

  kind:control-plane:smoke:
    cmds:
      - |
        PYTHONDONTWRITEBYTECODE=1 \
        SCION_BIN='{{.SCION_BIN}}' \
        HUB_ENDPOINT='{{.SCION_OPS_KIND_HUB_URL}}' \
        SCION_OPS_KIND_HUB_PORT='{{.SCION_OPS_KIND_HUB_PORT}}' \
        SCION_OPS_KIND_HUB_URL='{{.SCION_OPS_KIND_HUB_URL}}' \
        SCION_OPS_MCP_URL='{{.SCION_OPS_MCP_URL}}' \
        uv run scripts/kind-control-plane-smoke.py {{.CLI_ARGS}}

  kind:control-plane:delete:
    prompt: This deletes Kubernetes control-plane resources from {{.KIND_CONTEXT}}. Continue?
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' delete -k deploy/kind/control-plane --ignore-not-found=true

  kind:hub:apply:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' apply -f deploy/kind/namespace.yaml
      - kubectl --context '{{.KIND_CONTEXT}}' apply -k deploy/kind/control-plane

  kind:hub:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-hub -c hub -- scion --global broker status --json
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc,pvc,cm -l app.kubernetes.io/part-of=scion-control-plane

  kind:hub:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-hub

  kind:hub:auth-export:
    silent: true
    cmds:
      - |
        token="$(kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-hub -c hub -- cat /home/scion/.scion/dev-token)"
        printf 'export SCION_HUB_ENDPOINT=%s\n' '{{.SCION_OPS_KIND_HUB_URL}}'
        printf 'export HUB_ENDPOINT=%s\n' '{{.SCION_OPS_KIND_HUB_URL}}'
        printf 'export SCION_DEV_TOKEN=%s\n' "$token"

  kind:broker:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-hub --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' exec deploy/scion-hub -c hub -- scion --global broker status --json

  kind:broker:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-hub -c hub

  kind:mcp:status:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' rollout status deploy/scion-ops-mcp --timeout=120s
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' get deploy,svc -l app.kubernetes.io/name=scion-ops-mcp

  kind:mcp:logs:
    cmds:
      - kubectl --context '{{.KIND_CONTEXT}}' -n '{{.SCION_K8S_NAMESPACE}}' logs -f deploy/scion-ops-mcp

  kind:mcp:smoke:
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 uv run scripts/smoke-mcp-server.py --transport http --url '{{.SCION_OPS_MCP_URL}}'

  kind:bootstrap:
    cmds:
      - bash scripts/kind-bootstrap.sh {{.CLI_ARGS}}

  kind:round:preflight:
    cmds:
      - bash scripts/kind-round-preflight.sh {{.CLI_ARGS}}

  kind:doctor:
    cmds:
      - '{{.SCION_BIN}} doctor --profile kind'

  watch:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/watch.sh "$@"

  abort:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        bash orchestrator/abort.sh "$@"

  look:
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        '{{.SCION_BIN}}' look "$@"

  tail:
    cmds:
      - tail -F /tmp/scion-round.log

  verify:
    cmds:
      - git diff --check
      - task --list
      - python3 -c "import ast, pathlib; [ast.parse(pathlib.Path(p).read_text(), filename=p) for p in ('mcp_servers/scion_ops.py', 'scripts/kind-control-plane-smoke.py', 'scripts/smoke-mcp-server.py', 'scripts/validate-openspec-change.py', 'scripts/test-openspec-change-validator.py')]"
      - python3 scripts/test-openspec-change-validator.py
      - bash -n scripts/build-images.sh scripts/kind-bootstrap.sh scripts/kind-round-preflight.sh scripts/scion-runtime-patches.sh scripts/storage-status.sh orchestrator/run-round.sh orchestrator/round.sh orchestrator/spec-round.sh orchestrator/spec-implementation-round.sh orchestrator/abort.sh
