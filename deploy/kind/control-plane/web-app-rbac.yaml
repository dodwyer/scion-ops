apiVersion: v1
kind: ServiceAccount
metadata:
  name: scion-ops-web-app
  labels:
    app.kubernetes.io/name: scion-ops-web-app
    app.kubernetes.io/component: web-app
    app.kubernetes.io/part-of: scion-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scion-ops-web-app
  labels:
    app.kubernetes.io/name: scion-ops-web-app
    app.kubernetes.io/component: web-app
    app.kubernetes.io/part-of: scion-control-plane
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scion-ops-web-app
  labels:
    app.kubernetes.io/name: scion-ops-web-app
    app.kubernetes.io/component: web-app
    app.kubernetes.io/part-of: scion-control-plane
subjects:
  - kind: ServiceAccount
    name: scion-ops-web-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scion-ops-web-app
