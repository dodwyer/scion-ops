apiVersion: apps/v1
kind: Deployment
metadata:
  name: scion-ops-new-ui-eval
  labels:
    app.kubernetes.io/name: scion-ops-new-ui-eval
    app.kubernetes.io/component: new-ui-eval
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scion-ops-new-ui-eval
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scion-ops-new-ui-eval
        app.kubernetes.io/component: new-ui-eval
    spec:
      containers:
        - name: new-ui-eval
          image: localhost/scion-ops-new-ui-eval:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NEW_UI_EVALUATION_MODE
              value: live
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
