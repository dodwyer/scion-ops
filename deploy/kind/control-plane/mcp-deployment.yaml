apiVersion: apps/v1
kind: Deployment
metadata:
  name: scion-ops-mcp
  labels:
    app.kubernetes.io/name: scion-ops-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: scion-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scion-ops-mcp
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scion-ops-mcp
        app.kubernetes.io/component: mcp
        app.kubernetes.io/part-of: scion-control-plane
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: mcp
          image: localhost/scion-ops-mcp:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ ! -f "${SCION_OPS_ROOT}/Taskfile.yml" ]; then
                for candidate in /workspace/scion-ops /workspace/*/scion-ops /workspace/*/*/scion-ops /workspace/*/*/*/scion-ops; do
                  if [ -f "${candidate}/Taskfile.yml" ] && [ -f "${candidate}/mcp_servers/scion_ops.py" ]; then
                    export SCION_OPS_ROOT="${candidate}"
                    break
                  fi
                done
              fi
              export SCION_GROVE_ID="${SCION_GROVE_ID:-$(cat "${SCION_OPS_ROOT}/.scion/grove-id" 2>/dev/null || true)}"
              export SCION_OPS_GROVE_ID="${SCION_OPS_GROVE_ID:-$SCION_GROVE_ID}"
              git config --global --add safe.directory "${SCION_OPS_ROOT}" >/dev/null 2>&1 || true
              exec python "${SCION_OPS_ROOT}/mcp_servers/scion_ops.py"
          env:
            - name: HOME
              value: /home/scion
            - name: USER
              value: scion
            - name: LOGNAME
              value: scion
            - name: SHELL
              value: /bin/zsh
            - name: SCION_OPS_ROOT
              value: /workspace/scion-ops
            - name: SCION_OPS_HOST_WORKSPACE_ROOT
              value: /home/david/workspace
            - name: SCION_OPS_CONTAINER_WORKSPACE_ROOT
              value: /workspace
            - name: SCION_OPS_REPO_CHECKOUT_ROOT
              value: /home/scion/checkouts/github
            - name: SCION_OPS_MCP_TRANSPORT
              value: streamable-http
            - name: SCION_OPS_MCP_HOST
              value: 0.0.0.0
            - name: SCION_OPS_MCP_PORT
              value: "8765"
            - name: SCION_OPS_MCP_PATH
              value: /mcp
            - name: SCION_OPS_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_DEV_TOKEN_FILE
              value: /hub-state/dev-token
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8765
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: checkouts
              mountPath: /home/scion/checkouts
            - name: hub-state
              mountPath: /hub-state
              readOnly: true
      volumes:
        - name: workspace
          hostPath:
            path: /workspace
            type: Directory
        - name: checkouts
          persistentVolumeClaim:
            claimName: scion-ops-mcp-checkouts
        - name: hub-state
          persistentVolumeClaim:
            claimName: scion-hub-state
            readOnly: true
