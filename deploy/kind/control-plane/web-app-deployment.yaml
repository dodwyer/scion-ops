apiVersion: apps/v1
kind: Deployment
metadata:
  name: scion-ops-web-app
  labels:
    app.kubernetes.io/name: scion-ops-web-app
    app.kubernetes.io/component: web-app
    app.kubernetes.io/part-of: scion-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scion-ops-web-app
      app.kubernetes.io/component: web-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scion-ops-web-app
        app.kubernetes.io/component: web-app
        app.kubernetes.io/part-of: scion-control-plane
    spec:
      serviceAccountName: scion-ops-web-app
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: web-app
          image: localhost/scion-ops-new-ui-eval:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ ! -f "${SCION_OPS_ROOT}/Taskfile.yml" ]; then
                for candidate in /workspace/scion-ops /workspace/*/scion-ops /workspace/*/*/scion-ops /workspace/*/*/*/scion-ops; do
                  if [ -f "${candidate}/Taskfile.yml" ] && [ -f "${candidate}/new-ui-evaluation/adapter.py" ]; then
                    export SCION_OPS_ROOT="${candidate}"
                    break
                  fi
                done
              fi
              export SCION_GROVE_ID="${SCION_GROVE_ID:-$(cat "${SCION_OPS_ROOT}/.scion/grove-id" 2>/dev/null || true)}"
              export SCION_OPS_GROVE_ID="${SCION_OPS_GROVE_ID:-$SCION_GROVE_ID}"
              git config --global --add safe.directory "${SCION_OPS_ROOT}" >/dev/null 2>&1 || true
              exec /opt/scion-ops-mcp/venv/bin/python /app/new-ui-evaluation/adapter.py \
                --host 0.0.0.0 \
                --port 8787 \
                --project-root "${SCION_OPS_ROOT}"
          env:
            - name: HOME
              value: /home/scion
            - name: USER
              value: scion
            - name: LOGNAME
              value: scion
            - name: SHELL
              value: /bin/zsh
            - name: KUBECONFIG
              value: /run/config/scion-broker-kubeconfig/config
            - name: SCION_OPS_ROOT
              value: /workspace/scion-ops
            - name: NEW_UI_EVALUATION_MODE
              value: live
            - name: SCION_OPS_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_OPS_MCP_URL
              value: http://scion-ops-mcp:8765/mcp
            - name: OPENSPEC_TELEMETRY
              value: "0"
            - name: DO_NOT_TRACK
              value: "1"
            - name: SCION_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SCION_DEV_TOKEN_FILE
              value: /run/secrets/scion-hub-dev-auth/dev-token
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: kubeconfig
              mountPath: /run/config/scion-broker-kubeconfig
              readOnly: true
            - name: hub-dev-auth
              mountPath: /run/secrets/scion-hub-dev-auth
              readOnly: true
      volumes:
        - name: workspace
          hostPath:
            path: /workspace
            type: Directory
        - name: kubeconfig
          configMap:
            name: scion-broker-kubeconfig
        - name: hub-dev-auth
          secret:
            secretName: scion-hub-dev-auth
            optional: true
