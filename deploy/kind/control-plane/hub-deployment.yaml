apiVersion: apps/v1
kind: Deployment
metadata:
  name: scion-hub
  labels:
    app.kubernetes.io/name: scion-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/part-of: scion-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scion-hub
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scion-hub
        app.kubernetes.io/component: hub
        app.kubernetes.io/part-of: scion-control-plane
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: hub
          image: localhost/scion-base:latest
          imagePullPolicy: IfNotPresent
          command:
            - scion
          env:
            - name: HOME
              value: /home/scion
            - name: USER
              value: scion
            - name: LOGNAME
              value: scion
          args:
            - --global
            - server
            - start
            - --foreground
            - --production
            - --enable-hub
            - --enable-web
            - --dev-auth
            - --host
            - 0.0.0.0
            - --web-port
            - "8090"
            - --db
            - /home/scion/.scion/hub.db
            - --storage-dir
            - /home/scion/.scion/storage
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: state
              mountPath: /home/scion/.scion
            - name: settings
              mountPath: /home/scion/.scion/settings.yaml
              subPath: settings.yaml
              readOnly: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: scion-hub-state
        - name: settings
          configMap:
            name: scion-hub-settings
