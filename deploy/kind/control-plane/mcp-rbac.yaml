apiVersion: v1
kind: ServiceAccount
metadata:
  name: scion-ops-mcp
  labels:
    app.kubernetes.io/name: scion-ops-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: scion-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scion-ops-mcp
  labels:
    app.kubernetes.io/name: scion-ops-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: scion-control-plane
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scion-ops-mcp
  labels:
    app.kubernetes.io/name: scion-ops-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: scion-control-plane
subjects:
  - kind: ServiceAccount
    name: scion-ops-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scion-ops-mcp
