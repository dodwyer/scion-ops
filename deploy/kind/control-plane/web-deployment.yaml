apiVersion: apps/v1
kind: Deployment
metadata:
  name: scion-ops-web
  labels:
    app.kubernetes.io/name: scion-ops-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: scion-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scion-ops-web
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scion-ops-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: scion-control-plane
    spec:
      serviceAccountName: scion-ops-web
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: web
          image: localhost/scion-ops-web:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/scion
            - name: USER
              value: scion
            - name: LOGNAME
              value: scion
            - name: SCION_OPS_ROOT
              value: /workspace/scion-ops
            - name: SCION_OPS_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_HUB_ENDPOINT
              value: http://scion-hub:8090
            - name: SCION_OPS_WEB_PORT
              value: "8880"
            - name: SCION_OPS_WEB_HOST
              value: "0.0.0.0"
            - name: SCION_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SCION_DEV_TOKEN_FILE
              value: /run/secrets/scion-hub-dev-auth/dev-token
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8880
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: hub-dev-auth
              mountPath: /run/secrets/scion-hub-dev-auth
              readOnly: true
      volumes:
        - name: workspace
          hostPath:
            path: /workspace
            type: Directory
        - name: hub-dev-auth
          secret:
            secretName: scion-hub-dev-auth
            optional: true
