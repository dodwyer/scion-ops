apiVersion: v1
kind: ServiceAccount
metadata:
  name: scion-agent-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scion-agent-manager
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scion-agent-manager
subjects:
  - kind: ServiceAccount
    name: scion-agent-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scion-agent-manager
